<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::content})}">
<body>
<div th:fragment="content">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="text-center mb-4">
                <div class="d-inline-flex align-items-center justify-content-center rounded-circle mb-3"
                     style="width:64px; height:64px; background: linear-gradient(135deg, #4f46e5, #818cf8);">
                    <i class="bi bi-plus-circle text-white" style="font-size:1.6rem"></i>
                </div>
                <h3 style="font-weight:700;">Νέος Λογαριασμός</h3>
                <p class="text-muted small">Συμπληρώστε τα στοιχεία του νέου λογαριασμού</p>
            </div>

            <div class="card" style="border:none;">
                <div class="card-body p-4">
                    <form th:action="@{/accounts/new}" th:object="${accountDTO}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                        <div class="mb-3">
                            <label for="iban" class="form-label">IBAN</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-credit-card"></i></span>
                                <input type="text" class="form-control" id="iban" th:field="*{iban}"
                                       th:classappend="${#fields.hasErrors('iban')} ? 'is-invalid' : ''"
                                       placeholder="π.χ. GR1234567890123456789012345" maxlength="27">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('iban')}" th:errors="*{iban}"></div>
                            </div>
                            <div class="form-text">GR + 25 αριθμοί (σύνολο 27 χαρακτήρες)</div>
                        </div>

                        <div class="mb-3">
                            <label for="accountNumber" class="form-label">Account Number</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-hash"></i></span>
                                <input type="text" class="form-control" id="accountNumber" th:field="*{accountNumber}"
                                       th:classappend="${#fields.hasErrors('accountNumber')} ? 'is-invalid' : ''"
                                       placeholder="π.χ. 12345678901234567890" maxlength="20">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('accountNumber')}" th:errors="*{accountNumber}"></div>
                            </div>
                            <div class="form-text">Ακριβώς 20 αριθμοί</div>
                        </div>

                        <div class="mb-4">
                            <label for="balance" class="form-label">Αρχικό Υπόλοιπο (€)</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-currency-euro"></i></span>
                                <input type="number" step="0.01" min="0" class="form-control" id="balance" th:field="*{balance}"
                                       th:classappend="${#fields.hasErrors('balance')} ? 'is-invalid' : ''"
                                       placeholder="0.00">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('balance')}" th:errors="*{balance}"></div>
                            </div>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary py-2">
                                <i class="bi bi-check-lg me-1"></i>Δημιουργία Λογαριασμού
                            </button>
                        </div>
                    </form>

                    <div class="text-center mt-3">
                        <a th:href="@{/accounts}" class="text-muted small" style="text-decoration:none;">
                            <i class="bi bi-arrow-left me-1"></i>Επιστροφή στη Λίστα
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
