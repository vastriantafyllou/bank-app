<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::content})}">
<body>
<div th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div class="d-flex align-items-center">
            <div class="d-inline-flex align-items-center justify-content-center rounded-circle me-3"
                 style="width:48px; height:48px; background: linear-gradient(135deg, #4f46e5, #818cf8);">
                <i class="bi bi-wallet2 text-white" style="font-size:1.3rem"></i>
            </div>
            <div>
                <h2 class="mb-0">Λογαριασμοί</h2>
                <small class="text-muted">Διαχείριση τραπεζικών λογαριασμών</small>
            </div>
        </div>
        <a th:href="@{/accounts/new}" class="btn btn-primary">
            <i class="bi bi-plus-circle me-1"></i>Νέος Λογαριασμός
        </a>
    </div>

    <!-- Success Message -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle me-2"></i>
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Error Message -->
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle me-2"></i>
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Empty State -->
    <div th:if="${#lists.isEmpty(accounts)}" class="card" style="border:none;">
        <div class="card-body text-center py-5">
            <div class="d-inline-flex align-items-center justify-content-center rounded-circle mb-3"
                 style="width:72px; height:72px; background:#f1f5f9;">
                <i class="bi bi-inbox" style="font-size:2rem; color:#94a3b8;"></i>
            </div>
            <h4 class="mt-2" style="font-weight:600; color:#475569;">Δεν υπάρχουν λογαριασμοί</h4>
            <p class="text-muted mb-4">Δημιουργήστε τον πρώτο σας λογαριασμό για να ξεκινήσετε.</p>
            <a th:href="@{/accounts/new}" class="btn btn-primary px-4">
                <i class="bi bi-plus-circle me-1"></i>Δημιουργία Λογαριασμού
            </a>
        </div>
    </div>

    <!-- Accounts Table -->
    <div th:unless="${#lists.isEmpty(accounts)}" class="card" style="border:none;">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>IBAN</th>
                            <th>Account Number</th>
                            <th class="text-end">Υπόλοιπο</th>
                            <th class="text-center">Ενέργειες</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="account : ${accounts}">
                            <td>
                                <span class="badge" style="background:#eef2ff; color:#4f46e5;" th:text="${account.id}"></span>
                            </td>
                            <td>
                                <i class="bi bi-credit-card me-1" style="color:#4f46e5;"></i>
                                <span style="font-weight:500;" th:text="${account.iban}"></span>
                            </td>
                            <td class="text-muted" th:text="${account.accountNumber}"></td>
                            <td class="text-end">
                                <span class="fw-bold" th:classappend="${account.balance >= 0} ? 'text-success' : 'text-danger'"
                                      th:text="${#numbers.formatDecimal(account.balance, 1, 2)} + ' €'"></span>
                            </td>
                            <td class="text-center">
                                <a th:href="@{/accounts/{iban}(iban=${account.iban})}"
                                   class="btn btn-sm btn-outline-primary" title="Προβολή"
                                   style="border-radius:0.5rem;">
                                    <i class="bi bi-eye me-1"></i>Προβολή
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
