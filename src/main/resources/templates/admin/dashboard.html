<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::content})}">
<body>
<div th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div class="d-flex align-items-center">
            <div class="d-inline-flex align-items-center justify-content-center rounded-circle me-3"
                 style="width:48px; height:48px; background: linear-gradient(135deg, #4f46e5, #818cf8);">
                <i class="bi bi-speedometer2 text-white" style="font-size:1.3rem"></i>
            </div>
            <div>
                <h2 class="mb-0">Admin Dashboard</h2>
                <small class="text-muted">Επισκόπηση συστήματος</small>
            </div>
        </div>
        <a th:href="@{/admin/users}" class="btn btn-primary">
            <i class="bi bi-people me-1"></i>Διαχείριση Χρηστών
        </a>
    </div>

    <!-- Success Message -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle me-2"></i>
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row g-4">
        <!-- Users Card -->
        <div class="col-md-4">
            <div class="card text-center" style="border:none;">
                <div class="card-body py-4">
                    <div class="d-inline-flex align-items-center justify-content-center rounded-3 mb-3"
                         style="width:56px; height:56px; background:#eef2ff;">
                        <i class="bi bi-people-fill" style="font-size:1.6rem; color:#4f46e5;"></i>
                    </div>
                    <h3 class="mb-1" style="font-weight:700;" th:text="${userCount}">0</h3>
                    <p class="text-muted mb-0" style="font-size:0.85rem;">Χρήστες</p>
                </div>
            </div>
        </div>

        <!-- Accounts Card -->
        <div class="col-md-4">
            <div class="card text-center" style="border:none;">
                <div class="card-body py-4">
                    <div class="d-inline-flex align-items-center justify-content-center rounded-3 mb-3"
                         style="width:56px; height:56px; background:#ecfdf5;">
                        <i class="bi bi-wallet2" style="font-size:1.6rem; color:#10b981;"></i>
                    </div>
                    <h3 class="mb-1" style="font-weight:700;" th:text="${accountCount}">0</h3>
                    <p class="text-muted mb-0" style="font-size:0.85rem;">Λογαριασμοί</p>
                </div>
            </div>
        </div>

        <!-- Total Balance Card -->
        <div class="col-md-4">
            <div class="card text-center" style="border:none;">
                <div class="card-body py-4">
                    <div class="d-inline-flex align-items-center justify-content-center rounded-3 mb-3"
                         style="width:56px; height:56px; background:#fef3c7;">
                        <i class="bi bi-cash-stack" style="font-size:1.6rem; color:#f59e0b;"></i>
                    </div>
                    <h3 class="mb-1" style="font-weight:700;" th:text="${#numbers.formatDecimal(totalBalance, 1, 2)} + ' €'">0.00 €</h3>
                    <p class="text-muted mb-0" style="font-size:0.85rem;">Συνολικό Υπόλοιπο</p>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
