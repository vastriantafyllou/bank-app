<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::content})}">
<body>
<div th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div class="d-flex align-items-center">
            <div class="d-inline-flex align-items-center justify-content-center rounded-circle me-3"
                 style="width:48px; height:48px; background: linear-gradient(135deg, #4f46e5, #818cf8);">
                <i class="bi bi-people text-white" style="font-size:1.3rem"></i>
            </div>
            <div>
                <h2 class="mb-0">Διαχείριση Χρηστών</h2>
                <small class="text-muted">Προβολή και διαχείριση όλων των χρηστών</small>
            </div>
        </div>
        <a th:href="@{/admin}" class="btn btn-outline-primary">
            <i class="bi bi-arrow-left me-1"></i>Dashboard
        </a>
    </div>

    <!-- Success Message -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle me-2"></i>
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Error Message -->
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle me-2"></i>
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card" style="border:none;">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Username</th>
                            <th>Ονοματεπώνυμο</th>
                            <th>Email</th>
                            <th>Ρόλοι</th>
                            <th class="text-center">Λογ/μοί</th>
                            <th>Εγγραφή</th>
                            <th class="text-center">Κατάσταση</th>
                            <th class="text-center">Ενέργειες</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="user : ${users}">
                            <td>
                                <span class="badge" style="background:#eef2ff; color:#4f46e5;" th:text="${user.id}"></span>
                            </td>
                            <td>
                                <i class="bi bi-person me-1" style="color:#4f46e5;"></i>
                                <span style="font-weight:500;" th:text="${user.username}"></span>
                            </td>
                            <td>
                                <span th:if="${user.firstName != null || user.lastName != null}"
                                      th:text="${(user.firstName != null ? user.firstName : '') + ' ' + (user.lastName != null ? user.lastName : '')}"></span>
                                <span th:if="${user.firstName == null && user.lastName == null}" class="text-muted">—</span>
                            </td>
                            <td>
                                <span th:if="${user.email != null}" class="text-muted" th:text="${user.email}"></span>
                                <span th:if="${user.email == null}" class="text-muted">—</span>
                            </td>
                            <td>
                                <span th:each="role : ${user.roles}"
                                      class="badge me-1"
                                      th:classappend="${role.name() == 'ADMIN'} ? 'bg-danger' : 'bg-secondary'"
                                      th:text="${role.name()}"></span>
                            </td>
                            <td class="text-center">
                                <span class="badge" style="background:#ecfdf5; color:#065f46;" th:text="${user.accountCount}"></span>
                            </td>
                            <td class="text-muted" th:text="${#temporals.format(user.createdAt, 'dd/MM/yyyy')}"></td>
                            <td class="text-center">
                                <span th:if="${user.blocked}" class="badge" style="background:#fef2f2; color:#991b1b;">Blocked</span>
                                <span th:unless="${user.blocked}" class="badge" style="background:#ecfdf5; color:#065f46;">Active</span>
                            </td>
                            <td class="text-center">
                                <div class="d-flex gap-1 justify-content-center flex-wrap">
                                    <!-- Block/Unblock -->
                                    <form th:if="${!user.blocked}" th:action="@{/admin/users/{id}/block(id=${user.id})}" method="post" class="d-inline">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                        <button type="submit" class="btn btn-sm btn-outline-danger" title="Block"
                                                onclick="return confirm('Σίγουρα θέλετε να αποκλείσετε αυτόν τον χρήστη;')">
                                            <i class="bi bi-lock"></i>
                                        </button>
                                    </form>
                                    <form th:if="${user.blocked}" th:action="@{/admin/users/{id}/unblock(id=${user.id})}" method="post" class="d-inline">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                        <button type="submit" class="btn btn-sm btn-outline-success" title="Unblock">
                                            <i class="bi bi-unlock"></i>
                                        </button>
                                    </form>

                                    <!-- Assign/Remove ADMIN role -->
                                    <form th:unless="${user.roles.contains(T(com.vastriantafyllou.bankapp.core.enums.Role).ADMIN)}"
                                          th:action="@{/admin/users/{id}/assign-role(id=${user.id})}" method="post" class="d-inline">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                        <input type="hidden" name="role" value="ADMIN" />
                                        <button type="submit" class="btn btn-sm btn-outline-warning" title="Assign ADMIN"
                                                onclick="return confirm('Σίγουρα θέλετε να δώσετε ρόλο ADMIN;')">
                                            <i class="bi bi-shield-plus"></i>
                                        </button>
                                    </form>
                                    <form th:if="${user.roles.contains(T(com.vastriantafyllou.bankapp.core.enums.Role).ADMIN)}"
                                          th:action="@{/admin/users/{id}/remove-role(id=${user.id})}" method="post" class="d-inline">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                        <input type="hidden" name="role" value="ADMIN" />
                                        <button type="submit" class="btn btn-sm btn-outline-secondary" title="Remove ADMIN"
                                                onclick="return confirm('Σίγουρα θέλετε να αφαιρέσετε τον ρόλο ADMIN;')">
                                            <i class="bi bi-shield-minus"></i>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
