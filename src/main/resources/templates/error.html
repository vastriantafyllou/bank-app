<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::content})}">
<body>
<div th:fragment="content">
    <div class="row justify-content-center">
        <div class="col-md-5 text-center">
            <div class="card" style="border:none;">
                <div class="card-body py-5 px-4">
                    <div class="d-inline-flex align-items-center justify-content-center rounded-circle mb-3"
                         style="width:80px; height:80px; background: linear-gradient(135deg, #fbbf24, #f59e0b);">
                        <i class="bi bi-exclamation-triangle text-white" style="font-size:2rem"></i>
                    </div>
                    <h2 class="mt-2" style="font-weight:700;">Κάτι πήγε στραβά!</h2>
                    <p class="text-muted mt-2 mb-4" th:text="${error} ?: 'Παρουσιάστηκε ένα σφάλμα.'"></p>
                    <a th:href="@{/}" class="btn btn-primary px-4">
                        <i class="bi bi-house me-1"></i>Επιστροφή στην Αρχική
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
