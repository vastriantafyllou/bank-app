<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BankApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-dark: #4338ca;
            --primary-light: #818cf8;
            --primary-bg: #eef2ff;
            --accent: #06b6d4;
            --surface: #ffffff;
            --surface-hover: #f8fafc;
            --bg: #f1f5f9;
            --text: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --radius: 0.75rem;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -2px rgba(0,0,0,0.05);
            --shadow-lg: 0 10px 25px -3px rgba(0,0,0,0.08), 0 4px 6px -4px rgba(0,0,0,0.04);
            --transition: all 0.2s ease;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Navbar ── */
        .navbar {
            background: linear-gradient(135deg, #312e81 0%, #4f46e5 50%, #6366f1 100%);
            padding: 0.75rem 0;
            box-shadow: 0 4px 20px rgba(79, 70, 229, 0.25);
            border: none;
        }
        .navbar-brand {
            font-weight: 700;
            font-size: 1.35rem;
            letter-spacing: -0.02em;
        }
        .navbar .nav-link {
            font-weight: 500;
            font-size: 0.9rem;
            padding: 0.5rem 0.85rem !important;
            border-radius: 0.5rem;
            transition: var(--transition);
        }
        .navbar .nav-link:hover {
            background: rgba(255,255,255,0.15);
        }
        .navbar .btn-outline-light {
            border-radius: 0.5rem;
            font-weight: 500;
            font-size: 0.85rem;
            transition: var(--transition);
        }
        .navbar .btn-outline-light:hover {
            background: rgba(255,255,255,0.2);
            border-color: rgba(255,255,255,0.6);
        }

        /* ── Cards ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
        }
        .card:hover {
            box-shadow: var(--shadow);
        }
        .card-header {
            border-bottom: 1px solid var(--border);
            border-radius: var(--radius) var(--radius) 0 0 !important;
            padding: 1rem 1.25rem;
        }
        .card-header.bg-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%) !important;
            border-bottom: none;
        }
        .card-body {
            padding: 1.5rem;
        }

        /* ── Buttons ── */
        .btn {
            font-weight: 500;
            border-radius: 0.5rem;
            padding: 0.5rem 1.15rem;
            transition: var(--transition);
            font-size: 0.9rem;
        }
        .btn-primary {
            background: var(--primary);
            border-color: var(--primary);
            box-shadow: 0 2px 8px rgba(79, 70, 229, 0.25);
        }
        .btn-primary:hover, .btn-primary:focus {
            background: var(--primary-dark);
            border-color: var(--primary-dark);
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.35);
            transform: translateY(-1px);
        }
        .btn-outline-primary {
            color: var(--primary);
            border-color: var(--primary);
        }
        .btn-outline-primary:hover {
            background: var(--primary);
            border-color: var(--primary);
            transform: translateY(-1px);
        }
        .btn-success {
            background: var(--success);
            border-color: var(--success);
        }
        .btn-success:hover {
            filter: brightness(0.9);
            transform: translateY(-1px);
        }
        .btn-danger {
            background: var(--danger);
            border-color: var(--danger);
        }
        .btn-lg {
            padding: 0.65rem 1.5rem;
            font-size: 1rem;
        }

        /* ── Forms ── */
        .form-control, .form-select {
            border-radius: 0.5rem;
            border: 1.5px solid var(--border);
            padding: 0.6rem 0.85rem;
            font-size: 0.9rem;
            transition: var(--transition);
        }
        .form-control:focus, .form-select:focus {
            border-color: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.12);
        }
        .input-group-text {
            border-radius: 0.5rem 0 0 0.5rem;
            border: 1.5px solid var(--border);
            background: var(--surface-hover);
            color: var(--text-muted);
        }
        .form-label {
            font-weight: 500;
            font-size: 0.875rem;
            color: var(--text);
            margin-bottom: 0.35rem;
        }

        /* ── Tables ── */
        .table {
            font-size: 0.9rem;
            margin-bottom: 0;
        }
        .table th {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            padding: 0.85rem 1rem;
            border: none;
        }
        .table td {
            padding: 0.85rem 1rem;
            vertical-align: middle;
            border-bottom: 1px solid var(--border);
        }
        .table-hover tbody tr:hover {
            background: var(--primary-bg);
        }

        /* ── Alerts ── */
        .alert {
            border: none;
            border-radius: var(--radius);
            font-size: 0.9rem;
            font-weight: 500;
            padding: 0.85rem 1.15rem;
        }
        .alert-success {
            background: #ecfdf5;
            color: #065f46;
        }
        .alert-danger {
            background: #fef2f2;
            color: #991b1b;
        }

        /* ── Badges ── */
        .badge {
            font-weight: 500;
            font-size: 0.75rem;
            padding: 0.35em 0.7em;
            border-radius: 0.375rem;
        }

        /* ── Balance ── */
        .balance-display {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--primary);
        }

        /* ── Page headings ── */
        h2 {
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--text);
        }

        /* ── Utilities ── */
        .fade-in {
            animation: fadeIn 0.35s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ── Footer ── */
        footer {
            margin-top: auto !important;
        }
        footer hr {
            border-color: var(--border);
        }
        footer p {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" th:href="@{/}">
                <i class="bi bi-bank2 me-2"></i>BankApp
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center gap-1">
                    <li class="nav-item" th:if="${isAuthenticated}">
                        <a class="nav-link" th:href="@{/accounts}">
                            <i class="bi bi-list-ul me-1"></i>Λογαριασμοί
                        </a>
                    </li>
                    <li class="nav-item" th:if="${isAuthenticated}">
                        <a class="nav-link" th:href="@{/accounts/new}">
                            <i class="bi bi-plus-circle me-1"></i>Νέος Λογαριασμός
                        </a>
                    </li>
                    <li class="nav-item" th:if="${isAuthenticated}">
                        <a class="nav-link" th:href="@{/profile}">
                            <i class="bi bi-person-circle me-1"></i>Προφίλ
                        </a>
                    </li>
                    <li class="nav-item" th:if="${isAdmin}">
                        <a class="nav-link" th:href="@{/admin}">
                            <i class="bi bi-shield-lock me-1"></i>Admin
                        </a>
                    </li>

                    <li class="nav-item" th:if="${!isAuthenticated}">
                        <a class="nav-link" th:href="@{/login}">
                            <i class="bi bi-box-arrow-in-right me-1"></i>Σύνδεση
                        </a>
                    </li>

                    <li class="nav-item" th:if="${!isAuthenticated}">
                        <a class="nav-link" th:href="@{/register}">
                            <i class="bi bi-person-plus me-1"></i>Εγγραφή
                        </a>
                    </li>

                    <li class="nav-item d-flex align-items-center ms-2" th:if="${isAuthenticated}">
                        <span class="navbar-text text-white-50 me-2" style="font-size:0.85rem">
                            <i class="bi bi-person-fill me-1"></i>
                            <span th:text="${currentUsername}"></span>
                        </span>
                        <form th:action="@{/logout}" method="post" class="d-inline">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button type="submit" class="btn btn-sm btn-outline-light">
                                <i class="bi bi-box-arrow-right me-1"></i>Έξοδος
                            </button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-4 fade-in">
        <div th:replace="${content}"></div>
    </main>

    <footer class="container mt-5 mb-3 text-center">
        <hr>
        <p>&copy; 2026 BankApp - Vasilis Triantafyllou</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
