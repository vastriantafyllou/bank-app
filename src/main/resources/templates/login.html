<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::content})}">
<body>
<div th:fragment="content">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="text-center mb-4">
                <div class="d-inline-flex align-items-center justify-content-center rounded-circle mb-3"
                     style="width:64px; height:64px; background: linear-gradient(135deg, #4f46e5, #818cf8);">
                    <i class="bi bi-shield-lock text-white" style="font-size:1.6rem"></i>
                </div>
                <h3 style="font-weight:700;">Σύνδεση</h3>
                <p class="text-muted small">Εισάγετε τα στοιχεία σας για να συνεχίσετε</p>
            </div>

            <div class="card" style="border:none;">
                <div class="card-body p-4">

                    <div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                        <i class="bi bi-exclamation-triangle me-2"></i>
                        <span>Λάθος στοιχεία σύνδεσης.</span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>

                    <div th:if="${param.logout}" class="alert alert-success alert-dismissible fade show" role="alert">
                        <i class="bi bi-check-circle me-2"></i>
                        <span>Αποσυνδεθήκατε επιτυχώς.</span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>

                    <div th:if="${param.registered}" class="alert alert-success alert-dismissible fade show" role="alert">
                        <i class="bi bi-check-circle me-2"></i>
                        <span>Ο λογαριασμός δημιουργήθηκε. Μπορείτε να συνδεθείτε.</span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>

                    <form th:action="@{/login}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-person"></i></span>
                                <input id="username" name="username" type="text" class="form-control" autocomplete="username" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="password" class="form-label">Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-key"></i></span>
                                <input id="password" name="password" type="password" class="form-control" autocomplete="current-password" required>
                            </div>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary py-2">
                                <i class="bi bi-box-arrow-in-right me-1"></i>Σύνδεση
                            </button>
                        </div>
                    </form>

                    <hr class="my-3">
                    <div class="text-center">
                        <span class="text-muted small">Δεν έχετε λογαριασμό;</span>
                        <a th:href="@{/register}" class="small" style="color:#4f46e5; font-weight:500; text-decoration:none;"> Εγγραφή</a>
                    </div>
                </div>
            </div>

            <div class="text-center mt-3">
                <a th:href="@{/}" class="text-muted small" style="text-decoration:none;">
                    <i class="bi bi-arrow-left me-1"></i>Επιστροφή στην Αρχική
                </a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
