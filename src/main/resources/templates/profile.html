<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::content})}">
<body>
<div th:fragment="content">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="d-flex align-items-center mb-4">
                <div class="d-inline-flex align-items-center justify-content-center rounded-circle me-3"
                     style="width:48px; height:48px; background: linear-gradient(135deg, #4f46e5, #818cf8);">
                    <i class="bi bi-person-circle text-white" style="font-size:1.3rem"></i>
                </div>
                <div>
                    <h2 class="mb-0">Προφίλ Χρήστη</h2>
                    <small class="text-muted">Διαχειριστείτε τα στοιχεία και τον κωδικό σας</small>
                </div>
            </div>

            <!-- Success Message -->
            <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
                <i class="bi bi-check-circle me-2"></i>
                <span th:text="${successMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- Error Message -->
            <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="bi bi-exclamation-triangle me-2"></i>
                <span th:text="${errorMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- Account Info -->
            <div class="card mb-4" style="border:none; background: linear-gradient(135deg, #eef2ff 0%, #e0e7ff 100%);">
                <div class="card-body py-4">
                    <div class="row align-items-center">
                        <div class="col-md-6">
                            <small class="text-muted" style="font-size:0.75rem; text-transform:uppercase; letter-spacing:0.05em;">Username</small>
                            <h5 class="mb-0 mt-1" style="font-weight:600;" th:text="${user.username}"></h5>
                        </div>
                        <div class="col-md-6">
                            <small class="text-muted" style="font-size:0.75rem; text-transform:uppercase; letter-spacing:0.05em;">Μέλος από</small>
                            <h5 class="mb-0 mt-1" style="font-weight:600;"
                                th:text="${#temporals.format(user.createdAt, 'dd/MM/yyyy HH:mm')}"></h5>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Update Profile Form -->
            <div class="card mb-4" style="border:none;">
                <div class="card-body p-4">
                    <h5 class="mb-3" style="font-weight:600;">
                        <i class="bi bi-pencil-square me-2" style="color:#4f46e5;"></i>Επεξεργασία Προφίλ
                    </h5>
                    <form th:action="@{/profile/update}" th:object="${profileDTO}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="firstName" class="form-label">Όνομα</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                                    <input type="text" class="form-control" id="firstName" th:field="*{firstName}"
                                           th:classappend="${#fields.hasErrors('firstName')} ? 'is-invalid' : ''">
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></div>
                                </div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="lastName" class="form-label">Επώνυμο</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
                                    <input type="text" class="form-control" id="lastName" th:field="*{lastName}"
                                           th:classappend="${#fields.hasErrors('lastName')} ? 'is-invalid' : ''">
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></div>
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="email" class="form-label">Email</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                    <input type="email" class="form-control" id="email" th:field="*{email}"
                                           th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''">
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                                </div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="phone" class="form-label">Τηλέφωνο</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-telephone"></i></span>
                                    <input type="text" class="form-control" id="phone" th:field="*{phone}"
                                           th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid' : ''">
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></div>
                                </div>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-lg me-1"></i>Αποθήκευση Αλλαγών
                        </button>
                    </form>
                </div>
            </div>

            <!-- Change Password Form -->
            <div class="card" style="border:none;">
                <div class="card-body p-4">
                    <h5 class="mb-3" style="font-weight:600;">
                        <i class="bi bi-key me-2" style="color:#4f46e5;"></i>Αλλαγή Password
                    </h5>
                    <form th:action="@{/profile/change-password}" th:object="${passwordDTO}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                        <div class="mb-3">
                            <label for="currentPassword" class="form-label">Τρέχον Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                <input type="password" class="form-control" id="currentPassword" th:field="*{currentPassword}"
                                       th:classappend="${#fields.hasErrors('currentPassword')} ? 'is-invalid' : ''"
                                       autocomplete="current-password" required>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('currentPassword')}" th:errors="*{currentPassword}"></div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="newPassword" class="form-label">Νέο Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-key"></i></span>
                                <input type="password" class="form-control" id="newPassword" th:field="*{newPassword}"
                                       th:classappend="${#fields.hasErrors('newPassword')} ? 'is-invalid' : ''"
                                       autocomplete="new-password" required>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></div>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="confirmNewPassword" class="form-label">Επιβεβαίωση Νέου Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-key-fill"></i></span>
                                <input type="password" class="form-control" id="confirmNewPassword" th:field="*{confirmNewPassword}"
                                       th:classappend="${#fields.hasErrors('confirmNewPassword')} ? 'is-invalid' : ''"
                                       autocomplete="new-password" required>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('confirmNewPassword')}" th:errors="*{confirmNewPassword}"></div>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-shield-lock me-1"></i>Αλλαγή Password
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
