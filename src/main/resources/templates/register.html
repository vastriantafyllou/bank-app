<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::content})}">
<body>
<div th:fragment="content">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="text-center mb-4">
                <div class="d-inline-flex align-items-center justify-content-center rounded-circle mb-3"
                     style="width:64px; height:64px; background: linear-gradient(135deg, #4f46e5, #818cf8);">
                    <i class="bi bi-person-plus text-white" style="font-size:1.6rem"></i>
                </div>
                <h3 style="font-weight:700;">Εγγραφή</h3>
                <p class="text-muted small">Δημιουργήστε τον λογαριασμό σας</p>
            </div>

            <div class="card" style="border:none;">
                <div class="card-body p-4">
                    <form th:action="@{/register}" th:object="${registerDTO}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-person"></i></span>
                                <input type="text" class="form-control" id="username" th:field="*{username}"
                                       th:classappend="${#fields.hasErrors('username')} ? 'is-invalid' : ''"
                                       autocomplete="username" required>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-key"></i></span>
                                <input type="password" class="form-control" id="password" th:field="*{password}"
                                       th:classappend="${#fields.hasErrors('password')} ? 'is-invalid' : ''"
                                       autocomplete="new-password" required>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="confirmPassword" class="form-label">Επιβεβαίωση Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-key-fill"></i></span>
                                <input type="password" class="form-control" id="confirmPassword" th:field="*{confirmPassword}"
                                       th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid' : ''"
                                       autocomplete="new-password" required>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
                            </div>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary py-2">
                                <i class="bi bi-check-lg me-1"></i>Δημιουργία Λογαριασμού
                            </button>
                        </div>
                    </form>

                    <hr class="my-3">
                    <div class="text-center">
                        <span class="text-muted small">Έχετε ήδη λογαριασμό;</span>
                        <a th:href="@{/login}" class="small" style="color:#4f46e5; font-weight:500; text-decoration:none;"> Σύνδεση</a>
                    </div>
                </div>
            </div>

            <div class="text-center mt-3">
                <a th:href="@{/}" class="text-muted small" style="text-decoration:none;">
                    <i class="bi bi-arrow-left me-1"></i>Επιστροφή στην Αρχική
                </a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
